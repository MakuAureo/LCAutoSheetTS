<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stat Tracker</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Share Tech Mono', monospace;
  background: #111 url('bg.png') center/cover no-repeat;
}

  .card {
    background: rgba(0, 0, 0, 0.65);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 28px;
    width: min(680px, 90vw);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    backdrop-filter: blur(4px);
  }

  #status {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.05em;
    min-height: 16px;
  }

  #status.error { color: #f87171; }

  #status.success { color: #45de16; }

  #json-box {
    width: 100%;
    height: 500px;
    overflow-y: auto;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 16px 20px;
  }

  #json-box::-webkit-scrollbar { width: 6px; }
  #json-box::-webkit-scrollbar-track { background: transparent; }
  #json-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  #json-content {
    font-size: 13px;
    line-height: 1.7;
    color: rgba(255,255,255,0.85);
    white-space: pre;
  }

  #json-content.placeholder {
    color: rgba(255,255,255,0.25);
    font-style: italic;
    white-space: normal;
  }

  .jk { color: #79c0ff; }
  .js { color: #a5d6ff; }
  .jn { color: #4ade80; }
  .jb { color: #f87171; }
  .jz { color: #8b949e; }
    </style>
  </head>
  <body>
    <div class="card">
      <span id="status">Awaiting for connection response...</span>
      <div id="json-box">
        <div id="json-content" class="placeholder">No data yet — waiting for day to end.</div>
      </div>
    </div>

    <script>
      let es = null;

      function highlight(obj) {
        const json = JSON.stringify(obj, null, 2);
        return json.replace(
          /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(?:\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
          (m) => {
            if (/^"/.test(m) && /:$/.test(m)) return `<span class="jk">${m}</span>`;
              if (/^"/.test(m))                 return `<span class="js">${m}</span>`;
                if (/true|false/.test(m))         return `<span class="jb">${m}</span>`;
                if (/null/.test(m))               return `<span class="jz">${m}</span>`;
                return `<span class="jn">${m}</span>`;
              }
              );
      }

      function showJson(obj) {
        const el = document.getElementById("json-content");
        el.classList.remove("placeholder");
        el.innerHTML = highlight(obj);
      }

      function setStatus(text, success, error) {
        const el = document.getElementById("status");
        el.textContent = text;
        el.className = error ? "error" : "";
        el.className = success ? "success" : el.className;
      }

      function connect() {
        if (es) { es.close(); es = null; }

        es = new EventSource("/live");

        es.onmessage = (e) => {
          showJson(JSON.parse(e.data));
          setStatus("Last updated: " + new Date().toLocaleTimeString(), true, false);
        };

        es.onerror = (e) => {
          setStatus("Connection lost. Retrying...", false, true);
          es.close();
          setTimeout(connect, 3000);
        };
      }

      connect();
    </script>
  </body>
</html>
